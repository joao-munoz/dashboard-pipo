# render.yaml — PIPO Dashboard Web Service
services:
  - type: web_service
    name: dashboard-pipo
    repo: https://github.com/joao-munoz/dashboard-pipo
    branch: main
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/summary
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
